<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheese Clicker</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Fredoka', sans-serif;
    background: radial-gradient(circle at top, #2a2a40, #0d0d18);
    color: white;
    overflow-x: hidden;
    overflow-y: hidden;
}

/* SHAKE */
.shake {
    animation: shake 0.12s;
}

@keyframes shake {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(4px, -4px); }
    50% { transform: translate(-4px, 4px); }
    75% { transform: translate(4px, 4px); }
    100% { transform: translate(0px, 0px); }
}

.game {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    height: 100vh;
}

/* LEFT */
.left {
    display: flex;
    justify-content: center;
    align-items: center;
}

#rollBtn {
    width: 240px;
    height: 240px;
    background: url("cheese.png") center/cover no-repeat;
    border: none;
    cursor: pointer;
    transition: transform 0.05s;
}

#rollBtn:active {
    transform: scale(0.85);
}

/* CENTER */
.center {
    text-align: center;
    padding-top: 40px;
}

#cheeseCount {
    font-size: 48px;
}

#stats {
    opacity: 0.8;
}

#cheeseWorld {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    position: relative;
}

#bigCheese {
    width: 260px;
    transition: transform 0.2s ease;
}

#cheeseAura {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,200,0,0.15), transparent);
    border-radius: 50%;
    animation: pulseAura 2s infinite;
}

@keyframes pulseAura {
    0% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.1); opacity: 0.7; }
    100% { transform: scale(1); opacity: 0.4; }
}

/* FLOATING TEXT */
.floating {
    position: fixed;
    color: white;
    text-shadow: 0 0 8px rgba(255,255,255,0.9);
    animation: floatUp 0.8s ease-out forwards;
    pointer-events: none;
    z-index: 9999;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 1;
    }

    100% {
        transform: translateY(-60px);
        opacity: 0;
    }
}

/* RIGHT */
.right {
    padding: 10px;
    overflow-y: auto;
}

.panel {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
}

/* BUTTONS */
button {
    font-family: 'Fredoka', sans-serif;
    background: linear-gradient(145deg, #3a3a5a, #1a1a2e);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 12px;
    width: 100%;
    margin-top: 6px;
    cursor: pointer;
    transition: 0.15s;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    filter: brightness(1.2);
}

button.shop {
    background: linear-gradient(145deg, #2a5a3a, #1a2e22);
}

button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

/* POP */
.pop {
    animation: pop 0.2s ease;
}

@keyframes pop {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* SETTINGS */
#settings {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 180px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
}
</style>
</head>

<body>

<div id="settings">
    <b>Settings</b><br><br>

    <label>
        <input type="checkbox" id="shakeToggle" checked>
        Screen Shake
    </label>

    <button onclick="resetSave()">Reset Save</button>
</div>

<div class="game">

    <!-- LEFT -->
    <div class="left">
        <button id="rollBtn"></button>
    </div>

    <!-- CENTER -->
    <div class="center">

        <div id="cheeseCount">0 🧀</div>
        <div id="stats"></div>

        <div id="cheeseWorld">
            <img id="bigCheese" src="cheese.png">
            <div id="cheeseAura"></div>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="panel">

            <h3>Upgrades</h3>

            <button class="shop" data-type="click" onclick="buy('click')">
                Click Power +1 (<span id="clickCost"></span>)
            </button>

            <button class="shop" data-type="cps" onclick="buy('cps')">
                CPS +25 (<span id="cpsCost"></span>)
            </button>

            <button class="shop" data-type="farm" onclick="buy('farm')">
                Cheese Farm +50 CPS (<span id="farmCost"></span>)
            </button>

            <button class="shop" data-type="factory" onclick="buy('factory')">
                Factory +100 CPS (<span id="factoryCost"></span>)
            </button>

            <!-- ADD THESE BUTTONS under Factory -->

<button class="shop" data-type="portal" onclick="buy('portal')">
    Portal +500 CPS (<span id="portalCost"></span>)
</button>

<button class="shop" data-type="paradox" onclick="buy('paradox')">
    Paradox Engine +2000 CPS (<span id="paradoxCost"></span>)
</button>

<button class="shop" data-type="tooMuchMult" onclick="buy('tooMuchMult')">
    500x Global Multiplier (<span id="tooMuchMultCost"></span>)
</button>

<button class="shop" data-type="itsTooMuchMult" onclick="buy('itsTooMuchMult')">
    12000x Global Multiplier (<span id="itsTooMuchMultCost"></span>)
</button>

            <button class="shop" data-type="mult" onclick="buy('mult')">
                5x Global Multiplier (<span id="multCost"></span>)
            </button>

            <button class="shop" data-type="moreMult" onclick="buy('moreMult')">
                10x Global Multiplier (<span id="moreMultCost"></span>)
            </button>

            <button class="shop" data-type="evenMoreMult" onclick="buy('evenMoreMult')">
                25x Global Multiplier (<span id="evenMoreMultCost"></span>)
            </button>

            <button class="shop" data-type="soMuchMult" onclick="buy('soMuchMult')">
                50x Global Multiplier (<span id="soMuchMultCost"></span>)
            </button>

        </div>

    </div>

</div>

<script>

/* STATE */
let cheese = 0;
let cps = 0;
let clickPower = 1;
let mult = 1;
let growThreshold = 500;

let shakeEnabled = true;

/* UPGRADES */
const defaultUpgrades = {
    click: 15,
    cps: 10,
    farm: 60,
    factory: 250,

    portal: 500,
    paradox: 1250,

    mult: 1000,
    moreMult: 2000,
    evenMoreMult: 5000,
    soMuchMult: 12000,

    tooMuchMult: 20000,
    itsTooMuchMult: 40000,
};

let upgrades = { ...defaultUpgrades };

/* CLICK */
document.getElementById("rollBtn").addEventListener("click", (e) => {

    const gain = clickPower * mult;

cheese += gain;

spawn("+" + format(gain), e);

    if (shakeEnabled) {
        document.body.classList.add("shake");

        setTimeout(() => {
            document.body.classList.remove("shake");
        }, 120);
    }

    document.getElementById("cheeseCount").classList.add("pop");

    setTimeout(() => {
        document.getElementById("cheeseCount").classList.remove("pop");
    }, 200);
});

/* FLOAT TEXT */
function spawn(text, e) {

    const el = document.createElement("div");

    el.className = "floating";
    el.innerText = text;

    el.style.left = e.clientX + "px";
    el.style.top = e.clientY + "px";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 800);
}

/* BUY */
function buy(type) {

    if (!upgrades[type]) return;
    if (cheese < upgrades[type]) return;

    cheese -= upgrades[type];

    switch(type) {

        case "click":
            clickPower++;
            break;

        case "cps":
            cps += 25;
            break;

        case "farm":
            cps += 50;
            break;

        case "factory":
            cps += 100;
            break;

        case "portal":
            cps += 500;
            break;

        case "paradox":
            cps += 2000;
            break;

        /* TRUE MULTIPLIERS */

        case "mult":
            mult += 5;
            break;

        case "moreMult":
            mult += 10;
            break;

        case "evenMoreMult":
            mult += 25;
            break;

        case "soMuchMult":
            mult += 50;
            break;

        case "tooMuchMult":
            mult += 500;
            break;

        case "itsTooMuchMult":
            mult += 12000;
            break;
    }

    const isMultiplier = [
        "mult",
        "moreMult",
        "evenMoreMult",
        "soMuchMult",
        "tooMuchMult",
        "itsTooMuchMult"
    ].includes(type);

    upgrades[type] = Math.floor(
        upgrades[type] * (isMultiplier ? 3 : 1.7)
    );

    update();
}

/* GAME LOOP */
let last = Date.now();

function loop() {

    let now = Date.now();
    let dt = (now - last) / 1000;

    last = now;

    cheese += cps * mult * dt;

    checkPop();
    update();

    requestAnimationFrame(loop);
}

loop();

/* FORMAT */
function format(n) {

    if (n < 1000) {
        return Math.floor(n);
    }

    if (n < 1e6) {
        return (n / 1e3).toFixed(1) + "K";
    }

    if (n < 1e9) {
        return (n / 1e6).toFixed(1) + "M";
    }

    if (n < 1e12) {
        return (n / 1e9).toFixed(1) + "B";
    }

    if (n < 1e15) {
        return (n / 1e12).toFixed(1) + "T";
    }

    if (n < 1e18) {
        return (n / 1e15).toFixed(1) + "Qa";
    }

    return (n / 1e18).toFixed(1) + "Qi";
}

/* UPDATE */
function update() {

    document.getElementById("cheeseCount").innerText =
        format(cheese) + " 🧀";

    document.getElementById("stats").innerText =
        "+" + clickPower + " click | " +
        format(cps * mult) + " cps | " +
        "x" + format(mult);

    /* COSTS */
    document.getElementById("clickCost").innerText = format(upgrades.click);
    document.getElementById("cpsCost").innerText = format(upgrades.cps);
    document.getElementById("farmCost").innerText = format(upgrades.farm);
    document.getElementById("factoryCost").innerText = format(upgrades.factory);
    document.getElementById("multCost").innerText = format(upgrades.mult);
    document.getElementById("moreMultCost").innerText = format(upgrades.moreMult);
    document.getElementById("evenMoreMultCost").innerText = format(upgrades.evenMoreMult);
    document.getElementById("soMuchMultCost").innerText = format(upgrades.soMuchMult);
    document.getElementById("portalCost").innerText =
    format(upgrades.portal);

document.getElementById("paradoxCost").innerText =
    format(upgrades.paradox);

document.getElementById("tooMuchMultCost").innerText =
    format(upgrades.tooMuchMult);

document.getElementById("itsTooMuchMultCost").innerText =
    format(upgrades.itsTooMuchMult);

    /* DISABLE BUTTONS */
document.querySelectorAll(".shop").forEach(btn => {

    const type = btn.dataset.type;

    if (!upgrades[type]) return;

    btn.disabled = cheese < upgrades[type];
});

    /* CHEESE SCALE */
    let scale = 1 + Math.min(cheese / 10000, 0.5);

    document.getElementById("bigCheese").style.transform =
        `scale(${scale})`;
}

/* CHEESE POP */
function checkPop() {

    if (cheese >= growThreshold) {

        let bonus = Math.floor(cheese * 0.5);

        /* ADD BONUS INSTEAD OF REPLACING */
        cheese += bonus;

        growThreshold = Math.floor(growThreshold * 1.8);

        spawn(
            "💥 CHEESE POP! +" + format(bonus),
            {
                clientX: window.innerWidth / 2,
                clientY: window.innerHeight / 2
            }
        );
    }
}

/* SHAKE */
document.getElementById("shakeToggle")
.addEventListener("change", (e) => {

    shakeEnabled = e.target.checked;
});

/* SAVE */
function save() {

    localStorage.setItem(
        "cheese_v4",
        JSON.stringify({
            cheese,
            cps,
            clickPower,
            mult,
            upgrades,
            shakeEnabled
        })
    );
}

/* LOAD */
function load() {

    let data;

    try {
        data = JSON.parse(localStorage.getItem("cheese_v4"));
    }
    catch {
        data = null;
    }

    if (!data) return;

    cheese = data.cheese ?? 0;
    cps = data.cps ?? 0;
    clickPower = data.clickPower ?? 1;
    mult = data.mult ?? 1;
    shakeEnabled = data.shakeEnabled ?? true;

    upgrades = {

    click: data.upgrades?.click > 0
        ? data.upgrades.click
        : defaultUpgrades.click,

    cps: data.upgrades?.cps > 0
        ? data.upgrades.cps
        : defaultUpgrades.cps,

    farm: data.upgrades?.farm > 0
        ? data.upgrades.farm
        : defaultUpgrades.farm,

    factory: data.upgrades?.factory > 0
        ? data.upgrades.factory
        : defaultUpgrades.factory,

    portal: data.upgrades?.portal > 0
        ? data.upgrades.portal
        : defaultUpgrades.portal,

    paradox: data.upgrades?.paradox > 0
        ? data.upgrades.paradox
        : defaultUpgrades.paradox,

    mult: data.upgrades?.mult > 0
        ? data.upgrades.mult
        : defaultUpgrades.mult,

    moreMult: data.upgrades?.moreMult > 0
        ? data.upgrades.moreMult
        : defaultUpgrades.moreMult,

    evenMoreMult: data.upgrades?.evenMoreMult > 0
        ? data.upgrades.evenMoreMult
        : defaultUpgrades.evenMoreMult,

    soMuchMult: data.upgrades?.soMuchMult > 0
        ? data.upgrades.soMuchMult
        : defaultUpgrades.soMuchMult,

    tooMuchMult: data.upgrades?.tooMuchMult > 0
        ? data.upgrades.tooMuchMult
        : defaultUpgrades.tooMuchMult,

    itsTooMuchMult: data.upgrades?.itsTooMuchMult > 0
        ? data.upgrades.itsTooMuchMult
        : defaultUpgrades.itsTooMuchMult,
};

    document.getElementById("shakeToggle").checked =
        shakeEnabled;
}

/* RESET */
function resetSave() {

    if (!confirm("Reset all progress?")) return;

    localStorage.removeItem("cheese_v4");

    cheese = 0;
    cps = 0;
    clickPower = 1;
    mult = 1;

    shakeEnabled = true;

    upgrades = { ...defaultUpgrades };

    update();
}

/* INIT */
load();
update();

setInterval(save, 3000);

</script>

</body>
</html>
